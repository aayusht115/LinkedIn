services:
  - type: web
    name: dpm-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:10000
    disk:
      name: dpm-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/hiring.db
      - key: FLASK_DEBUG
        value: false
      - key: ALLOWED_ORIGIN
        value: https://linkedin-ipte.onrender.com
